name: CD Pipeline

on:
  pull_request:
    types: [opened, edited, synchronized]

jobs:
  deploy-preview:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Application
        run: npm run build

      - name: Extract Branch Name
        id: get-branch
        run: |
          RAW_BRANCH="${{ github.head_ref }}"
          # Converts forward slashes like 'feature/login' to 'feature-login' for safe directory paths
          CLEAN_BRANCH=$(echo "$RAW_BRANCH" | sed 's/\//-/g')
          echo "branch_folder=$CLEAN_BRANCH" >> $GITHUB_OUTPUT

      - name: Deploy Preview to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
          target-folder: preview/${{ steps.get-branch.outputs.branch_folder }}