name: CD Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed

jobs:
  deploy-to-gh-pages:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Application
        run: npm run build

      # Dynamically extract the branch name from the workflow run event
      - name: Extract Branch Name
        id: get-branch
        run: |
          RAW_BRANCH="${{ github.event.workflow_run.head_branch }}"
          # Replace forward slashes (like feature/login) with dashes for clean folder names
          CLEAN_BRANCH=$(echo "$RAW_BRANCH" | sed 's/\//-/g')
          echo "branch_folder=$CLEAN_BRANCH" >> $GITHUB_OUTPUT

      # Deploy the output folder (usually 'dist' or 'build') to GitHub Pages
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # Change to 'build' if your build script outputs to 'build'
          branch: gh-pages # The branch GitHub Pages will serve from
          target-folder: preview/${{ steps.get-branch.outputs.branch_folder }} # Unique subfolder per branch