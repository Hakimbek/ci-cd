name: CD Pipeline

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  deploy-to-gh-pages:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write
      pull-requests: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Extract Branch Name
        id: get-branch
        run: |
          RAW_BRANCH="${{ github.head_ref }}"
          CLEAN_BRANCH=$(echo "$RAW_BRANCH" | sed 's/\//-/g')
          echo "branch_folder=$CLEAN_BRANCH" >> "$GITHUB_OUTPUT"

      - name: Build Application
        run: npm run build

      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-content
        continue-on-error: true

      - name: Prepare site content
        run: |
          mkdir -p "gh-pages-content/preview/${{ steps.get-branch.outputs.branch_folder }}"
          cp -r dist/. "gh-pages-content/preview/${{ steps.get-branch.outputs.branch_folder }}/"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: gh-pages-content

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Comment Preview Link on PR
        uses: thollander/actions-comment-pull-request@v2
        with:
          message: |
            🚀 **Preview Deployed Successfully!**
            You can view the live changes for this PR here:
            https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/preview/${{ steps.get-branch.outputs.branch_folder }}/
          comment_tag: preview_link